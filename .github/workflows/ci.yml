name: CI

on:
  push:
    branches:
      - main
      - 'refactor/**'
  pull_request:
    branches:
      - main
      - 'refactor/**'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Lint, Build, Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        if: ${{ hashFiles('.eslintrc.*') != '' }}
        run: |
          if npm run | grep -q "lint"; then
            npm run lint --if-present
          else
            echo "No lint script; skipping"
          fi

      - name: Build
        run: npm run build --if-present

      - name: Unit tests
        run: npm test --if-present -- --ci --reporters=default --reporters=jest-junit
        env:
          CI: true

      - name: Enforce import boundaries (dependency-cruiser)
        run: npx --yes dependency-cruiser --config .dependency-cruiser.js src --validate

  e2e:
    name: Playwright E2E (optional)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          if npm run | grep -q "e2e"; then
            npm run e2e
          else
            npx playwright test || true
          fi
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
